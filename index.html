<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CW Focus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap');

  :root {
    --bg: #f7f7f6;
    --surface: #ffffff;
    --border: #e8e8e6;
    --border-subtle: #f0f0ee;
    --text-primary: #363636;
    --text-secondary: #888884;
    --text-muted: #b8b8b4;
    --accent-done: #d4d4d0;
    --accent-stock: #2a2a28;
    --tag-bg: #f0f0ee;
    --tag-text: #666662;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .app { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo { font-size: 15px; font-weight: 500; letter-spacing: -0.02em; }
  .logo span { color: var(--text-muted); font-weight: 300; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .btn-icon svg { width: 18px; height: 18px; }
  .btn-icon:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .btn-icon.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

  .tabs {
    display: flex;
    padding: 12px 0 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: flex; align-items: center; gap: 6px;
  }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
  .badge {
    background: var(--tag-bg); color: var(--tag-text);
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 1px 6px; border-radius: 20px;
  }
  .tab.active .badge { background: var(--text-primary); color: #fff; }

  .filter-bar {
    display: none;
    gap: 8px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .filter-bar.open { display: flex; }

  .toggle-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--surface);
    transition: all 0.15s;
  }
  .toggle-chip.on { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  .toggle-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
  .toggle-chip.on .dot { opacity: 1; }

  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
    color: var(--text-muted);
    font-size: 12px;
    min-height: 44px;
  }

  .btn-reload {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .btn-reload:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .btn-reload.spinning .icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #btnClearAll { background: transparent; border-color: transparent; color: var(--text-muted); }
  #btnClearAll:hover { color: var(--text-primary); }

  .card-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 40px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    transition: all 0.3s;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 200px; 
  }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card.exiting { animation: cardExit 0.35s forwards; }
  @keyframes cardExit {
    100% { opacity: 0; transform: translateX(40px) scaleY(0); max-height: 0; margin: 0; padding: 0; }
  }

  .card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 12px 0 0 12px;
  }
  .card.type-to::before { background: #c8b8f0; }
  .card.type-dm::before { background: #a8d4c8; }
  .card.type-pinned::before { background: #f0d4a8; }

  .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .room-name {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
  }
  .msg-type-tag {
    font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 500;
  }
  .msg-type-tag.to { background: #ede8fa; color: #7c5cc8; }
  .msg-type-tag.dm { background: #e8f4f0; color: #3a8c78; }
  .msg-type-tag.pinned { background: #faf0e0; color: #b07830; }

  .card-body {
    color: var(--text-secondary); font-size: 13px; line-height: 1.6;
    height: 84px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden; margin-top: 8px;
  }
  .card-time { font-size: 11px; color: var(--text-muted); margin-left: auto; font-family: 'DM Mono'; }

  .card-actions {
    display: flex; gap: 8px; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border-subtle);
  }

  .btn-done, .btn-stock {
    flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s;
  }
  .btn-done { background: var(--surface); color: var(--text-secondary); }
  .btn-stock { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }

  .stock-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px;
  }

  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200;
    backdrop-filter: blur(2px); align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; padding: 28px; width: 420px; }
  .form-input { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--text-primary); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px;
    opacity: 0; transition: all 0.25s; z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">CW <span>Focus</span></div>
    <div class="header-actions">
      <button class="btn-icon" id="btnFilter" title="フィルター">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
      </button>
      <button class="btn-icon" id="btnSettings" title="設定">⚙</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" id="tabInbox" onclick="switchTab('inbox')">Inbox <span class="badge" id="inboxCount">0</span></div>
    <div class="tab" id="tabStock" onclick="switchTab('stock')">Stock <span class="badge" id="stockCount">0</span></div>
  </div>

  <div class="filter-bar" id="filterBar">
    <div class="toggle-chip on" id="filterTo" onclick="toggleFilter('to')"><span class="dot"></span> @TO</div>
    <div class="toggle-chip on" id="filterDm" onclick="toggleFilter('dm')"><span class="dot"></span> ダイレクト</div>
    <div class="toggle-chip on" id="filterPin" onclick="toggleFilter('pin')"><span class="dot"></span> ピン止め</div>
  </div>

  <div id="viewInbox">
    <div class="status-bar">
      <span id="statusText"></span>
      <div style="display:flex; gap:8px;">
        <button class="btn-reload" id="btnClearAll" onclick="clearAllInbox()">全て既読</button>
        <button class="btn-reload" id="btnReload" onclick="fetchMessages()"><span class="icon">↻</span> 更新</button>
      </div>
    </div>
    <div class="card-list" id="cardList"></div>
    <div class="empty-state" id="emptyInbox" style="display:none;">
      <div class="title">Inbox Zero</div>
    </div>
  </div>

  <div id="viewStock" style="display:none;">
    <div class="status-bar"><span>後で確認するメッセージ</span></div>
    <div id="stockList"></div>
    <div class="empty-state" id="emptyStock" style="display:none;">ストックなし</div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2>設定</h2>
    <input class="form-input" id="apiKeyInput" type="password" placeholder="APIトークン">
    <input class="form-input" id="myIdInput" type="text" placeholder="自分のID">
    <div style="display:flex; justify-content:flex-end; gap:8px;">
      <button class="btn-reload" onclick="closeSettings()">キャンセル</button>
      <button class="btn-reload" style="background:var(--text-primary); color:#fff;" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state = {
  apiKey: '', myId: '', messages: [], stock: [],
  filters: { to: true, dm: true, pin: true },
  tab: 'inbox'
};
const workerUrl = "https://cwf-proxy.axixa23.workers.dev";

function init() {
  const saved = localStorage.getItem('cw_focus');
  if (saved) {
    const d = JSON.parse(saved);
    state.apiKey = d.apiKey || '';
    state.myId = d.myId || '';
    state.stock = d.stock || [];
    state.filters = d.filters || { to: true, dm: true, pin: true };
  }
  applyFiltersUI();
  renderStock();
  if (state.apiKey) fetchMessages();
}

function persist() {
  localStorage.setItem('cw_focus', JSON.stringify({
    apiKey: state.apiKey, myId: state.myId, stock: state.stock, filters: state.filters,
  }));
}

async function fetchMessages() {
  const btn = document.getElementById('btnReload');
  btn.classList.add('spinning');
  setStatus('取得中…');

  try {
    const roomsRes = await fetch(`${workerUrl}/proxy/rooms`, { headers: { 'X-ChatWorkToken': state.apiKey } });
    const rooms = await roomsRes.json();

    // 未読がある部屋を抽出
    const unreadRooms = rooms.filter(r => r.unread_num > 0);
    const msgs = [];

    // 100部屋まで
    for (const room of unreadRooms.slice(0, 100)) {
      try {
        const res = await fetch(`${workerUrl}/proxy/rooms/${room.room_id}/messages?force=0`, { headers: { 'X-ChatWorkToken': state.apiKey } });
        const roomMsgs = await res.json();
        if (!Array.isArray(roomMsgs)) continue;

        for (const m of roomMsgs) {
          const type = detectType(m, room);
          msgs.push({
            id: `${room.room_id}-${m.message_id}`,
            roomName: room.name,
            sender: m.account.name,
            body: m.body,
            time: formatTime(m.send_time),
            msgType: type
          });
        }
      } catch(e) {}
    }

    state.messages = msgs;
    renderCards();
    updateCounts();
    setStatus(`${state.messages.filter(m => shouldShow(m.msgType)).length}件のメッセージ`);
  } catch(e) {
    setStatus('エラーが発生しました');
  } finally {
    btn.classList.remove('spinning');
  }
}

function detectType(m, room) {
  if (room.type === 'direct') return 'dm';
  if (state.myId && m.body.includes(`[To:${state.myId}]`)) return 'to';
  if (room.sticky) return 'pin';
  return 'other';
}

function shouldShow(type) {
  // フィルタがONなら表示。それ以外のメッセージ(other)は常に表示
  if (type === 'to') return state.filters.to;
  if (type === 'dm') return state.filters.dm;
  if (type === 'pin') return state.filters.pin;
  return true; 
}

function renderCards() {
  const list = document.getElementById('cardList');
  const visible = state.messages.filter(m => shouldShow(m.msgType));
  document.getElementById('emptyInbox').style.display = visible.length === 0 ? 'block' : 'none';
  
  list.innerHTML = visible.map(m => `
    <div class="card type-${m.msgType}" id="card-${m.id}">
      <div class="card-meta">
        <span class="room-name">${esc(m.roomName)}</span>
        <span class="msg-type-tag ${m.msgType}">${m.msgType.toUpperCase()}</span>
        <span class="card-time">${m.time}</span>
      </div>
      <div style="font-weight:500; font-size:13px;">${esc(m.sender)}</div>
      <div class="card-body">${esc(m.body)}</div>
      <div class="card-actions">
        <button class="btn-done" onclick="doneCard('${m.id}')">✕ 無視</button>
        <button class="btn-stock" onclick="stockCard('${m.id}')">◆ ストック</button>
      </div>
    </div>
  `).join('');
}

function toggleFilter(key) {
  state.filters[key] = !state.filters[key];
  applyFiltersUI();
  persist();
  renderCards();
  updateCounts();
}

function applyFiltersUI() {
  ['to','dm','pin'].forEach(k => {
    const el = document.getElementById('filter' + k.charAt(0).toUpperCase() + k.slice(1));
    if (el) el.className = 'toggle-chip' + (state.filters[k] ? ' on' : '');
  });
}

function updateCounts() {
  const inbox = state.messages.filter(m => shouldShow(m.msgType)).length;
  document.getElementById('inboxCount').textContent = inbox;
  document.getElementById('stockCount').textContent = state.stock.length;
}

function clearAllInbox() {
  if (!confirm('表示中のメッセージをクリアしますか？')) return;
  state.messages = state.messages.filter(m => !shouldShow(m.msgType));
  renderCards(); updateCounts();
}

function doneCard(id) {
  const el = document.getElementById('card-' + id);
  el.classList.add('exiting');
  setTimeout(() => {
    state.messages = state.messages.filter(m => m.id !== id);
    renderCards(); updateCounts();
  }, 300);
}

function stockCard(id) {
  const msg = state.messages.find(m => m.id === id);
  state.stock.push(msg);
  persist();
  doneCard(id);
  renderStock();
  showToast('ストックしました');
}

function renderStock() {
  const list = document.getElementById('stockList');
  document.getElementById('emptyStock').style.display = state.stock.length === 0 ? 'block' : 'none';
  list.innerHTML = state.stock.map(m => `
    <div class="stock-card">
      <div style="flex:1;">
        <div style="font-weight:500;">${esc(m.sender)}</div>
        <div style="font-size:12px; color:var(--text-secondary);">${esc(m.body)}</div>
      </div>
      <button class="btn-reload" onclick="unstock('${m.id}')">削除</button>
    </div>
  `).join('');
}

function unstock(id) {
  state.stock = state.stock.filter(s => s.id !== id);
  persist(); renderStock(); updateCounts();
}

function switchTab(tab) {
  state.tab = tab;
  document.getElementById('viewInbox').style.display = tab === 'inbox' ? 'block' : 'none';
  document.getElementById('viewStock').style.display = tab === 'stock' ? 'block' : 'none';
  document.getElementById('tabInbox').className = 'tab' + (tab === 'inbox' ? ' active' : '');
  document.getElementById('tabStock').className = 'tab' + (tab === 'stock' ? ' active' : '');
}

document.getElementById('btnFilter').onclick = () => {
  const open = document.getElementById('filterBar').classList.toggle('open');
  document.getElementById('btnFilter').classList.toggle('active', open);
};

document.getElementById('btnSettings').onclick = () => document.getElementById('settingsOverlay').classList.add('open');
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function saveSettings() {
  state.apiKey = document.getElementById('apiKeyInput').value;
  state.myId = document.getElementById('myIdInput').value;
  persist(); closeSettings(); fetchMessages();
}

function formatTime(unix) {
  const d = new Date(unix * 1000);
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function setStatus(t) { document.getElementById('statusText').textContent = t; }
function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
