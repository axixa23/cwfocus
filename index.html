<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CW Focus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap');

  :root {
    --bg: #f7f7f6;
    --surface: #ffffff;
    --border: #e8e8e6;
    --border-subtle: #f0f0ee;
    --text-primary: #363636;
    --text-secondary: #888884;
    --text-muted: #b8b8b4;
    --accent-done: #d4d4d0;
    --accent-stock: #2a2a28;
    --tag-bg: #f0f0ee;
    --tag-text: #666662;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ===== LAYOUT ===== */
  .app { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .logo span { color: var(--text-muted); font-weight: 300; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn-icon {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    font-size: 15px;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .btn-icon.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 0;
    padding: 12px 0 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
  .tab:hover:not(.active) { color: var(--text-primary); }
  .badge {
    background: var(--tag-bg); color: var(--tag-text);
    font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 1px 6px; border-radius: 20px; min-width: 20px; text-align: center;
  }
  .tab.active .badge { background: var(--text-primary); color: #fff; }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    display: none;
    gap: 8px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .filter-bar.open { display: flex; }

  .toggle-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--surface);
    user-select: none;
    transition: all 0.15s;
  }
  .toggle-chip.on {
    background: var(--text-primary); color: #fff; border-color: var(--text-primary);
  }
  .toggle-chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; opacity: 0.5;
  }
  .toggle-chip.on .dot { opacity: 1; }

  /* ===== STATUS BAR ===== */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
    color: var(--text-muted);
    font-size: 12px;
    min-height: 36px;
  }

  .btn-reload {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-reload:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .btn-reload.spinning .icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== CARDS ===== */
  .card-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 40px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.15s, transform 0.15s, opacity 0.3s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 200px; 
}
  }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card.exiting {
    animation: cardExit 0.35s cubic-bezier(0.4,0,1,1) forwards;
  }
  @keyframes cardExit {
    0% { opacity: 1; transform: translateX(0) scaleY(1); max-height: 300px; margin-bottom: 8px; }
    40% { opacity: 0; transform: translateX(40px) scaleY(0.95); }
    100% { opacity: 0; transform: translateX(40px) scaleY(0); max-height: 0; margin-bottom: 0; padding: 0; }
  }
  .card.stocking {
    animation: cardStock 0.35s cubic-bezier(0.4,0,1,1) forwards;
  }
  @keyframes cardStock {
    0% { opacity: 1; transform: translateX(0) scaleY(1); max-height: 300px; margin-bottom: 8px; }
    40% { opacity: 0; transform: translateX(-40px) scaleY(0.95); }
    100% { opacity: 0; transform: translateX(-40px) scaleY(0); max-height: 0; margin-bottom: 0; padding: 0; }
  }

  /* card type stripe */
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
  }
  .card.type-to::before { background: #c8b8f0; }
  .card.type-dm::before { background: #a8d4c8; }
  .card.type-pinned::before { background: #f0d4a8; }

  .card-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px;
  }
  .room-name {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .msg-type-tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--tag-text);
    font-weight: 500;
  }
  .msg-type-tag.to { background: #ede8fa; color: #7c5cc8; }
  .msg-type-tag.dm { background: #e8f4f0; color: #3a8c78; }
  .msg-type-tag.pinned { background: #faf0e0; color: #b07830; }

  .card-sender {
    font-weight: 500;
    font-size: 13px;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .card-body {
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-time {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    margin-left: auto;
  }

  .card-actions {
    display: flex; gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border-subtle);
  }

  .btn-done, .btn-stock {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn-done {
    background: var(--surface);
    color: var(--text-secondary);
  }
  .btn-done:hover { background: var(--tag-bg); color: var(--text-primary); border-color: var(--text-secondary); }
  .btn-stock {
    background: var(--text-primary);
    color: #fff;
    border-color: var(--text-primary);
  }
  .btn-stock:hover { background: #333; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state .title { font-size: 14px; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-state .sub { font-size: 12px; }

  /* ===== STOCK VIEW ===== */
  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 8px;
  }
  .stock-card-body { flex: 1; min-width: 0; }
  .stock-card-sender { font-weight: 500; font-size: 13px; margin-bottom: 2px; }
  .stock-card-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .stock-card-room { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .btn-unstock {
    padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-size: 11px; color: var(--text-secondary);
    white-space: nowrap; transition: all 0.15s;
  }
  .btn-unstock:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  /* ===== SETTINGS MODAL ===== */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 200;
    backdrop-filter: blur(2px);
    align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    width: 420px;
    max-width: calc(100vw - 32px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text-primary); background: var(--bg);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--text-secondary); }
  .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn-primary {
    padding: 8px 20px; border-radius: var(--radius-sm);
    background: var(--text-primary); color: #fff; border: none;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #333; }
  .btn-secondary {
    padding: 8px 16px; border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text-secondary);
    border: 1px solid var(--border);
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--text-primary); color: #fff;
    padding: 10px 20px; border-radius: 20px; font-size: 12px;
    opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== DEMO NOTICE ===== */
  .demo-notice {
    background: #faf0e0; border: 1px solid #f0d4a8;
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 12px; color: #b07830; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">CW <span>Focus</span></div>
    <div class="header-actions">
      <button class="btn-icon" id="btnFilter" title="フィルター">⚡</button>
      <button class="btn-icon" id="btnSettings" title="設定">⚙</button>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" id="tabInbox" onclick="switchTab('inbox')">
      Inbox <span class="badge" id="inboxCount">0</span>
    </div>
    <div class="tab" id="tabStock" onclick="switchTab('stock')">
      Stock <span class="badge" id="stockCount">0</span>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar">
    <div class="toggle-chip on" id="filterTO" onclick="toggleFilter('to')">
      <span class="dot"></span> @TO
    </div>
    <div class="toggle-chip on" id="filterDM" onclick="toggleFilter('dm')">
      <span class="dot"></span> ダイレクト
    </div>
    <div class="toggle-chip on" id="filterPin" onclick="toggleFilter('pin')">
      <span class="dot"></span> ピン止め
    </div>
  </div>

  <!-- INBOX TAB -->
  <div id="viewInbox">
    <div class="status-bar">
      <span id="statusText" style="color:var(--text-muted);font-size:12px;"></span>
      <button class="btn-reload" id="btnReload" onclick="fetchMessages()">
        <span class="icon">↻</span> 更新
      </button>
    </div>
    <div id="demoNotice" class="demo-notice" style="display:none;">
      ⚠ デモモード — サンプルデータを表示中。設定からAPIキーを入力してください。
    </div>
    <div class="card-list" id="cardList"></div>
    <div class="empty-state" id="emptyInbox" style="display:none;">
      <div class="icon">✦</div>
      <div class="title">Inbox Zero</div>
      <div class="sub">すべて処理しました</div>
    </div>
  </div>

  <!-- STOCK TAB -->
  <div id="viewStock" style="display:none;">
    <div class="status-bar">
      <span style="font-size:12px;color:var(--text-muted);">後で確認するメッセージ</span>
    </div>
    <div id="stockList"></div>
    <div class="empty-state" id="emptyStock" style="display:none;">
      <div class="icon">◇</div>
      <div class="title">ストックなし</div>
      <div class="sub">気になるメッセージをストックしましょう</div>
    </div>
  </div>

</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2>設定</h2>
    <div class="form-group">
      <label class="form-label">Chatwork API キー</label>
      <input class="form-input" id="apiKeyInput" type="password" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
      <p class="form-hint">Chatwork設定 → API連携 から取得できます</p>
    </div>
    <div class="form-group">
      <label class="form-label">自分のアカウントID（オプション）</label>
      <input class="form-input" id="myIdInput" type="text" placeholder="例: 123456">
      <p class="form-hint">TOフィルターの検出に使用します</p>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">キャンセル</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = {
  apiKey: '',
  myId: '',
  messages: [],   // { id, roomId, roomName, sender, body, time, msgType }
  stock: [],
  filters: { to: true, dm: true, pin: true },
  tab: 'inbox',
  lastFetched: null,
  isDemo: false,
};
const workerUrl = "https://cwf-proxy.axixa23.workers.dev";
  
// ===== INIT =====
function init() {
  const saved = localStorage.getItem('cw_focus');
  if (saved) {
    const d = JSON.parse(saved);
    state.apiKey = d.apiKey || '';
    state.myId = d.myId || '';
    state.stock = d.stock || [];
    state.filters = d.filters || { to: true, dm: true, pin: true };
  }
  applyFiltersUI();
  renderStock();
  updateCounts();

  if (!state.apiKey) {
    loadDemoMessages();
    document.getElementById('demoNotice').style.display = 'flex';
  } else {
    fetchMessages();
  }
}

// ===== SAVE =====
function persist() {
  localStorage.setItem('cw_focus', JSON.stringify({
    apiKey: state.apiKey,
    myId: state.myId,
    stock: state.stock,
    filters: state.filters,
  }));
}

// ===== API FETCH =====
async function fetchMessages() {
  if (!state.apiKey) { loadDemoMessages(); return; }

  const btn = document.getElementById('btnReload');
  btn.classList.add('spinning');
  setStatus('取得中…');
  document.getElementById('demoNotice').style.display = 'none';

  try {
    // Get rooms list
    const roomsRes = await fetch(`${workerUrl}/proxy/rooms`, {
      headers: { 'X-ChatWorkToken': state.apiKey }
    });
    if (!roomsRes.ok) throw new Error(`API error: ${roomsRes.status}`);
    const rooms = await roomsRes.json();

    // Filter rooms by settings
    const targetRooms = rooms.filter(r => {
      if (state.filters.dm && r.type === 'direct') return true;
      if (state.filters.pin && r.sticky) return true;
      return state.filters.to || state.filters.dm || state.filters.pin;
    });

    // Fetch unread messages from each room (limit to 10 rooms to avoid rate limit)
    const msgs = [];
    const toFetch = targetRooms.slice(0, 100);

    for (const room of toFetch) {
      if (room.unread_num === 0) continue;
      try {
        const msgsRes = await fetch(
          `${workerUrl}/proxy/rooms/${room.room_id}/messages?force=0`,
          { headers: { 'X-ChatWorkToken': state.apiKey } }
        );
        if (!msgsRes.ok) continue;
        const roomMsgs = await msgsRes.json();
        for (const m of roomMsgs) {
          const msgType = detectMsgType(m, room, state.myId);
          if (!shouldShow(msgType)) continue;
          msgs.push({
            id: `${room.room_id}-${m.message_id}`,
            roomId: room.room_id,
            roomName: room.name,
            sender: m.account?.name || '不明',
            body: m.body,
            time: formatTime(m.send_time),
            msgType,
          });
        }
      } catch(e) { /* skip room */ }
    }

    const prevCount = state.messages.length;
    state.messages = msgs;
    state.lastFetched = new Date();
    state.isDemo = false;

    const newCount = msgs.length;
    if (prevCount > 0 && newCount === prevCount) {
      setStatus('新しいメッセージはありません');
    } else {
      setStatus(`${newCount}件のメッセージ`);
    }
    renderCards();
    updateCounts();

  } catch(e) {
    setStatus('取得に失敗しました。APIキーを確認してください。');
    showToast('取得エラー: ' + e.message);
  } finally {
    btn.classList.remove('spinning');
  }
}

function detectMsgType(msg, room, myId) {
  if (room.type === 'direct') return 'dm';
  if (room.sticky) return 'pinned';
  if (myId && msg.body && msg.body.includes(`[To:${myId}]`)) return 'to';
  return 'other';
}

function shouldShow(msgType) {
  if (msgType === 'to' && state.filters.to) return true;
  if (msgType === 'dm' && state.filters.dm) return true;
  if (msgType === 'pinned' && state.filters.pin) return true;
  if (msgType === 'other') return true;
  return false;
}

function formatTime(unix) {
  const d = new Date(unix * 1000);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  if (diffMin < 1) return 'たった今';
  if (diffMin < 60) return `${diffMin}分前`;
  if (diffMin < 1440) return `${Math.floor(diffMin/60)}時間前`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ===== DEMO DATA =====
function loadDemoMessages() {
  state.messages = [
    { id: 'demo1', roomId: '1', roomName: 'プロジェクトA', sender: '田中 太郎', body: '[To:me] 先日の件、確認お願いします。資料添付しましたので確認後ご返答いただければ幸いです。', time: '12分前', msgType: 'to' },
    { id: 'demo2', roomId: '2', roomName: 'ダイレクト: 鈴木', sender: '鈴木 花子', body: '明日の会議の件ですが、時間変更になりました。15:00→16:00でいかがでしょうか？', time: '45分前', msgType: 'dm' },
    { id: 'demo3', roomId: '3', roomName: '全社連絡', sender: '管理部', body: '来週月曜日は全体会議です。13:00〜14:30 会議室B（オンライン同時開催）', time: '2時間前', msgType: 'pinned' },
    { id: 'demo4', roomId: '4', roomName: '開発チーム', sender: '佐藤 健', body: '[To:me] レビューお願いします！PR #142 マージして大丈夫そうでしたら承認いただけると助かります。', time: '3時間前', msgType: 'to' },
    { id: 'demo5', roomId: '5', roomName: 'ダイレクト: 山本', sender: '山本 誠', body: 'お疲れ様です！先日相談した件ですが、週末に少し時間ありますか？', time: '昨日', msgType: 'dm' },
  ];
  state.isDemo = true;
  setStatus(`${state.messages.length}件（デモ）`);
  renderCards();
  updateCounts();
}

// ===== RENDER CARDS =====
function renderCards() {
  const list = document.getElementById('cardList');
  const empty = document.getElementById('emptyInbox');
  const visible = state.messages.filter(m => shouldShow(m.msgType));

  if (visible.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = visible.map(m => cardHTML(m)).join('');
}

function cardHTML(m) {
  const typeLabel = { to: '@TO', dm: 'DM', pinned: 'ピン', other: '' }[m.msgType] || '';
  const typeClass = { to: 'to', dm: 'dm', pinned: 'pinned', other: '' }[m.msgType] || '';
  const body = escHtml(m.body).replace(/\[To:[^\]]+\]/g, '<span style="color:#7c5cc8;font-weight:500">$&</span>');
  return `
    <div class="card type-${m.msgType}" id="card-${m.id}">
      <div class="card-meta">
        <span class="room-name">${escHtml(m.roomName)}</span>
        ${typeLabel ? `<span class="msg-type-tag ${typeClass}">${typeLabel}</span>` : ''}
        <span class="card-time">${m.time}</span>
      </div>
      <div class="card-sender">${escHtml(m.sender)}</div>
      <div class="card-body">${body}</div>
      <div class="card-actions">
        <button class="btn-done" onclick="doneCard('${m.id}')">✕ 無視</button>
        <button class="btn-stock" onclick="stockCard('${m.id}')">◆ ストック</button>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== ACTIONS =====
function doneCard(id) {
  const el = document.getElementById('card-' + id);
  if (!el) return;
  el.classList.add('exiting');
  setTimeout(() => {
    state.messages = state.messages.filter(m => m.id !== id);
    renderCards(); updateCounts();
  }, 380);
}

function stockCard(id) {
  const msg = state.messages.find(m => m.id === id);
  if (!msg) return;
  const el = document.getElementById('card-' + id);
  el.classList.add('stocking');
  setTimeout(() => {
    state.messages = state.messages.filter(m => m.id !== id);
    if (!state.stock.find(s => s.id === id)) state.stock.push(msg);
    persist();
    renderCards(); renderStock(); updateCounts();
    showToast('ストックしました');
  }, 380);
}

function unstockCard(id) {
  state.stock = state.stock.filter(s => s.id !== id);
  persist();
  renderStock(); updateCounts();
}

// ===== RENDER STOCK =====
function renderStock() {
  const list = document.getElementById('stockList');
  const empty = document.getElementById('emptyStock');
  if (state.stock.length === 0) {
    list.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';
  list.innerHTML = state.stock.map(m => `
    <div class="stock-card">
      <div class="stock-card-body">
        <div class="stock-card-sender">${escHtml(m.sender)}</div>
        <div class="stock-card-text">${escHtml(m.body)}</div>
        <div class="stock-card-room">${escHtml(m.roomName)} · ${m.time}</div>
      </div>
      <button class="btn-unstock" onclick="unstockCard('${m.id}')">削除</button>
    </div>`).join('');
}

// ===== COUNTS =====
function updateCounts() {
  const visible = state.messages.filter(m => shouldShow(m.msgType));
  document.getElementById('inboxCount').textContent = visible.length;
  document.getElementById('stockCount').textContent = state.stock.length;
}

// ===== TABS =====
function switchTab(tab) {
  state.tab = tab;
  document.getElementById('viewInbox').style.display = tab === 'inbox' ? 'block' : 'none';
  document.getElementById('viewStock').style.display = tab === 'stock' ? 'block' : 'none';
  document.getElementById('tabInbox').className = 'tab' + (tab === 'inbox' ? ' active' : '');
  document.getElementById('tabStock').className = 'tab' + (tab === 'stock' ? ' active' : '');
}

// ===== FILTERS =====
function toggleFilter(key) {
  state.filters[key] = !state.filters[key];
  applyFiltersUI();
  persist();
  renderCards(); updateCounts();
}

function applyFiltersUI() {
  ['to','dm','pin'].forEach(k => {
    const el = document.getElementById('filter' + k.charAt(0).toUpperCase() + k.slice(1));
    if (el) el.className = 'toggle-chip' + (state.filters[k] ? ' on' : '');
  });
}

document.getElementById('btnFilter').addEventListener('click', () => {
  const bar = document.getElementById('filterBar');
  const btn = document.getElementById('btnFilter');
  const open = bar.classList.toggle('open');
  btn.classList.toggle('active', open);
});

// ===== SETTINGS =====
document.getElementById('btnSettings').addEventListener('click', () => {
  document.getElementById('apiKeyInput').value = state.apiKey;
  document.getElementById('myIdInput').value = state.myId;
  document.getElementById('settingsOverlay').classList.add('open');
});

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveSettings() {
  state.apiKey = document.getElementById('apiKeyInput').value.trim();
  state.myId = document.getElementById('myIdInput').value.trim();
  persist();
  closeSettings();
  if (state.apiKey) {
    document.getElementById('demoNotice').style.display = 'none';
    fetchMessages();
  } else {
    document.getElementById('demoNotice').style.display = 'flex';
    loadDemoMessages();
  }
}

document.getElementById('settingsOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeSettings();
});

// ===== STATUS / TOAST =====
function setStatus(msg) {
  document.getElementById('statusText').textContent = msg;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== START =====
init();
</script>
</body>
</html>
